server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend Health Check
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"UP","service":"frontend"}';
    }

    # React/Vite SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
